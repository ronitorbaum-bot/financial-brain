<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המוח הפיננסי שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCfbIy46SSzmqOndfct8hjqf5_rJ30MyNA",
    authDomain: "financial-brain-a9ac4.firebaseapp.com",
    projectId: "financial-brain-a9ac4",
    storageBucket: "financial-brain-a9ac4.appspot.com",
    messagingSenderId: "338902574044",
    appId: "1:338902574044:web:e2b347206103322f988898"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  window.auth = auth; window.signOut = signOut; window.signIn = signInWithEmailAndPassword; window.signUp = createUserWithEmailAndPassword; window.resetPass = sendPasswordResetEmail;
</script>

<style>
:root{--wine:#B85868;--wine-dark:#8B3A4A;--text:#1a0a0e;--text-light:#5a3040;--r:12px;--card-r:20px;--shadow:0 10px 30px rgba(184,88,104,0.15);}
[data-theme="dark"]{--text:#f5e8ec;--text-light:#d4a0b0;--glass:rgba(20,4,10,0.85);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:#fff8fa;color:var(--text);transition:0.3s;min-height:100vh;}
.bg-watercolor{position:fixed;inset:0;background:url('https://drive.google.com/uc?id=18195Zd7wfajGiiZOD7QSlfzDDT4D68rl') no-repeat center/cover;z-index:-1;}
[data-theme="dark"] .bg-watercolor{filter:brightness(0.3) saturate(0.5);}

header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;backdrop-filter:blur(20px);background:rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.2);position:sticky;top:0;z-index:100;}
.header-actions{display:flex;gap:8px;flex:1;justify-content:flex-start;}
.header-center{flex:2;text-align:center;}
.header-right{flex:1;display:flex;justify-content:flex-end;}
.app-title{font-size:1.4rem;font-weight:300;color:var(--wine-dark);}
.header-icon img{width:42px;height:42px;object-fit:contain;border-radius:10px;}
.hdr-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--wine);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 12px rgba(184,88,104,0.2);}

main{padding:20px 16px 100px;max-width:500px;margin:0 auto;}
.card{background:rgba(255,255,255,0.4);backdrop-filter:blur(15px);border-radius:var(--card-r);padding:20px;border:1px solid rgba(255,255,255,0.3);margin-bottom:20px;box-shadow:var(--shadow);}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:15px 0;}
.summary-item{text-align:center;padding:10px;background:rgba(255,255,255,0.3);border-radius:12px;}
.sc-label{font-size:0.75rem;opacity:0.8;}
.sc-value{font-size:1.1rem;font-weight:900;color:var(--wine-dark);}

.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nav-btn{padding:18px;border:none;border-radius:var(--r);background:var(--wine);color:white;font-size:1rem;font-weight:500;cursor:pointer;box-shadow:0 6px 20px rgba(184,88,104,0.25);transition:0.2s;}
.nav-btn:active{transform:scale(0.95);}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;z-index:200;}
.panel{width:100%;background:white;border-radius:25px 25px 0 0;padding:25px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:0.3s;}
.overlay.open{display:flex;}.overlay.open .panel{transform:translateY(0);}
.form-group{margin-bottom:15px;}
label{display:block;font-size:0.85rem;margin-bottom:5px;}
input, select, textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;font-family:inherit;}
.submit-btn{width:100%;padding:14px;background:var(--wine);color:white;border:none;border-radius:12px;font-size:1rem;margin-top:10px;}

#auth-screen{position:fixed;inset:0;background:#fff;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{width:100%;max-width:350px;text-align:center;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--wine-dark);color:white;padding:10px 25px;border-radius:20px;opacity:0;transition:0.3s;z-index:1000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h2 style="color:var(--wine);margin-bottom:20px;">המוח הפיננסי שלי</h2>
    <div id="login-form">
      <input type="email" id="auth-email" placeholder="אימייל" class="form-group"><br>
      <input type="password" id="auth-pass" placeholder="סיסמה" class="form-group"><br>
      <button class="submit-btn" onclick="handleAuth('login')">כניסה</button>
      <p style="margin-top:15px;font-size:0.9rem;" onclick="toggleAuth()">חדשה כאן? הירשמי</p>
    </div>
  </div>
</div>

<div class="bg-watercolor"></div>
<div class="app" id="main-app" style="display:none;">
  <header>
    <div class="header-actions">
      <button class="hdr-btn" onclick="handleLogout()">🚪</button>
      <button class="hdr-btn" id="moon-btn" onclick="toggleTheme()">🌙</button>
      <button class="hdr-btn" onclick="openPanel('settings')">⚙️</button>
    </div>
    <div class="header-center">
      <h1 class="app-title">המוח הפיננסי שלי</h1>
    </div>
    <div class="header-right">
      <div class="header-icon"><img src="https://drive.google.com/uc?id=1fJnOhrW9nLop6dMtpzZPjNr4FfhGiOWx" alt="לוגו"></div>
    </div>
  </header>

  <main>
    <div class="card">
      <h3 id="greeting" style="margin-bottom:10px;">שלום רונית</h3>
      <div class="summary-grid">
        <div class="summary-item"><div class="sc-label">הכנסות</div><div class="sc-value" id="total-inc">₪0</div></div>
        <div class="summary-item"><div class="sc-label">הוצאות</div><div class="sc-value" id="total-exp">₪0</div></div>
        <div class="summary-item"><div class="sc-label">יתרה</div><div class="sc-value" id="total-bal">₪0</div></div>
      </div>
      <div id="conn-status" style="font-size:0.7rem;text-align:center;opacity:0.6;">חיבור מקומי</div>
    </div>

    <div class="nav-grid">
      <button class="nav-btn" onclick="openPanel('income')">💰 הכנסות</button>
      <button class="nav-btn" onclick="openPanel('expense')">💸 הוצאות</button>
      <button class="nav-btn" onclick="openPanel('reminders')">⏰ תזכורות</button>
      <button class="nav-btn" onclick="openPanel('shopping')">🛒 קניות</button>
    </div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="if(event.target==this)closePanel()">
  <div class="panel" id="panel">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
      <h2 id="panel-title">כותרת</h2>
      <button onclick="closePanel()" style="background:none;border:none;font-size:1.5rem;">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<div class="toast" id="toast">הודעה</div>

<script>
let currentUser = null;
let SCRIPT_URL = localStorage.getItem('mfp_url') || '';
let iList = JSON.parse(localStorage.getItem('mfp_inc') || '[]');
let eList = JSON.parse(localStorage.getItem('mfp_exp') || '[]');

document.addEventListener('DOMContentLoaded', () => {
  window.auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      updateHome();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
    }
  });
});

function handleAuth(type) {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  if(!email || !pass) return showToast("מלאי פרטים");
  window.signIn(window.auth, email, pass).catch(e => showToast("שגיאה בכניסה"));
}

function handleLogout() { window.signOut(window.auth); }

function updateHome() {
  const inc = iList.reduce((s,i) => s + Number(i.amount||0), 0);
  const exp = eList.reduce((s,i) => s + Number(i.amount||0), 0);
  document.getElementById('total-inc').innerText = '₪' + inc.toLocaleString();
  document.getElementById('total-exp').innerText = '₪' + exp.toLocaleString();
  document.getElementById('total-bal').innerText = '₪' + (inc - exp).toLocaleString();
}

function openPanel(type) {
  const p = document.getElementById('panel-body');
  const t = document.getElementById('panel-title');
  document.getElementById('overlay').classList.add('open');
  
  if(type === 'income') {
    t.innerText = "רישום הכנסה";
    p.innerHTML = `
      <div class="form-group"><label>סכום</label><input type="number" id="f-amt"></div>
      <div class="form-group"><label>עסק</label><input type="text" id="f-biz"></div>
      <button class="submit-btn" onclick="saveData('income')">שמור</button>
    `;
  } else if(type === 'settings') {
    t.innerText = "הגדרות";
    p.innerHTML = `
      <div class="form-group"><label>URL של גוגל סקריפט</label><input type="url" id="f-url" value="${SCRIPT_URL}"></div>
      <button class="submit-btn" onclick="saveSettings()">שמור הגדרות</button>
    `;
  }
}

function closePanel() { document.getElementById('overlay').classList.remove('open'); }

function saveData(type) {
  if(type === 'income') {
    const data = { amount: document.getElementById('f-amt').value, business: document.getElementById('f-biz').value, date: new Date().toISOString() };
    iList.push(data);
    localStorage.setItem('mfp_inc', JSON.stringify(iList));
    showToast("נשמר מקומית");
    updateHome();
    closePanel();
  }
}

function saveSettings() {
  SCRIPT_URL = document.getElementById('f-url').value;
  localStorage.setItem('mfp_url', SCRIPT_URL);
  showToast("הגדרות נשמרו");
  closePanel();
}

function toggleTheme() {
  const b = document.body;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
