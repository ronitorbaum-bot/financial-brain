<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  // ══════════════════════════════════════
  //  הגדר כאן את פרטי Firebase שלך
  // ══════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyCfbIy46SSzmqOndfct8hjqf5_rJ30MyNA",
    authDomain: "financial-brain-a9ac4.firebaseapp.com",
    projectId: "financial-brain-a9ac4",
    storageBucket: "financial-brain-a9ac4.firebasestorage.app",
    messagingSenderId: "542119174959",
    appId: "1:542119174959:web:b3ac000e2b7820ea24b7da"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  window._auth = auth;
  window._fbFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, sendPasswordResetEmail };

  onAuthStateChanged(auth, user => {
    window._currentUser = user;
    if (user) {
      document.getElementById('auth-screen').style.display  = 'none';
      document.getElementById('app-screen').style.display   = 'flex';
      document.getElementById('user-email').textContent = user.email;
      loadFromSheets();
    } else {
      document.getElementById('auth-screen').style.display  = 'flex';
      document.getElementById('app-screen').style.display   = 'none';
    }
  });
</script>

/* ── Auth Screen ── */
#auth-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo-icon{font-size:3rem;display:block;margin-bottom:8px;}
.auth-logo-title{font-size:1.8rem;font-weight:300;color:var(--wine);letter-spacing:2px;}
.auth-logo-sub{font-size:.8rem;color:var(--text-muted);font-weight:300;}
.auth-tabs{display:flex;gap:4px;background:var(--wine-light);border-radius:10px;padding:4px;margin-bottom:24px;}
[data-theme="dark"] .auth-tabs{background:rgba(184,88,104,0.15);}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-family:'Heebo',sans-serif;font-size:.85rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.auth-tab.active{background:white;color:var(--wine);box-shadow:0 2px 8px rgba(184,88,104,0.15);}
[data-theme="dark"] .auth-tab.active{background:var(--surface);}
.auth-form{display:flex;flex-direction:column;gap:14px;}
.auth-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-family:'Heebo',sans-serif;font-size:.95rem;color:var(--text);outline:none;transition:border .2s;direction:ltr;text-align:left;}
.auth-input:focus{border-color:var(--wine);}
.auth-input::placeholder{color:var(--text-muted);}
.auth-btn{background:var(--wine);color:white;border:none;border-radius:10px;padding:13px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;}
.auth-btn:hover{background:var(--wine-dark);transform:translateY(-1px);}
.auth-btn:active{transform:translateY(0);}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-forgot{text-align:center;margin-top:8px;}
.auth-forgot a{color:var(--wine);font-size:.8rem;cursor:pointer;text-decoration:none;}
.auth-error{background:#fee;border:1px solid #fcc;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#c00;text-align:center;}
.auth-success{background:#efe;border:1px solid #cfc;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#060;text-align:center;}

/* ── App Screen ── */
#app-screen{position:relative;z-index:1;display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 80px;}

/* ── Header ── */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;position:sticky;top:0;z-index:50;background:transparent;border-bottom:none;}
[data-theme="dark"] .app-header{background:transparent;}
.header-logo{font-size:1.15rem;font-weight:300;color:var(--wine);letter-spacing:1.5px;text-shadow:0 1px 8px rgba(255,255,255,0.8);}
.header-actions{display:flex;gap:8px;align-items:center;}
.hdr-btn{width:40px;height:40px;border-radius:12px;border:none;background:var(--wine);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:white;transition:all .2s;box-shadow:0 3px 10px rgba(184,88,104,0.35);}
.hdr-btn:hover{background:var(--wine-dark);transform:translateY(-1px);}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--wine);position:absolute;bottom:2px;left:2px;}

/* ── Dashboard ── */
.dashboard{padding:20px;}
.dash-greeting{font-size:.85rem;color:var(--text-muted);margin-bottom:4px;}
.dash-title{font-size:1.8rem;font-weight:300;color:var(--wine);margin-bottom:20px;letter-spacing:.5px;}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.summary-card{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
.summary-card.full{grid-column:1/-1;}
.summary-card.accent{background:linear-gradient(135deg,var(--wine),var(--wine-dark));border:none;color:white;}
.summary-label{font-size:.72rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.summary-card.accent .summary-label{color:rgba(255,255,255,.7);}
.summary-value{font-size:1.4rem;font-weight:700;color:var(--wine);}
.summary-card.accent .summary-value{color:white;font-size:1.6rem;}
.summary-sub{font-size:.75rem;color:var(--text-muted);margin-top:3px;}
.summary-card.accent .summary-sub{color:rgba(255,255,255,.7);}

/* Tax bar */
.tax-bar-wrap{margin-top:10px;}
.tax-bar-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-muted);margin-bottom:5px;}
.tax-bar{height:6px;background:var(--wine-light);border-radius:3px;overflow:hidden;}
.tax-bar-fill{height:100%;background:var(--wine);border-radius:3px;transition:width .6s ease;}

/* Recent */
.section-title{font-size:.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.recent-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.recent-item{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.recent-icon{width:36px;height:36px;border-radius:10px;background:var(--wine-light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.recent-info{flex:1;min-width:0;}
.recent-name{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-date{font-size:.72rem;color:var(--text-muted);}
.recent-amount{font-size:.95rem;font-weight:600;}
.recent-amount.income{color:var(--success);}
.recent-amount.expense{color:var(--danger);}

/* Nav */
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.nav-card{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.nav-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--wine);}
.nav-card:active{transform:translateY(0);}
.nav-card-icon{font-size:1.5rem;}
.nav-card-text{font-size:.88rem;font-weight:500;}
.nav-card-count{font-size:.72rem;color:var(--text-muted);}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:transparent;border-top:none;display:flex;padding:8px 0 16px;z-index:50;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:6px 4px;font-family:'Heebo',sans-serif;color:var(--text-muted);transition:all .2s;}
.bnav-btn.active{color:var(--wine);} .bnav-btn.active .bnav-icon{background:var(--wine);border-radius:10px;padding:4px 8px;font-size:1rem;color:white;display:block;}
.bnav-icon{font-size:1.2rem;padding:4px 8px;border-radius:10px;transition:all .2s;}
.bnav-label{font-size:.65rem;font-weight:500;}
.bnav-dot{width:4px;height:4px;border-radius:50%;background:var(--wine);opacity:0;}
.bnav-btn.active .bnav-dot{opacity:1;}

/* ── Overlay Panel ── */
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);}
.panel{position:relative;background:var(--bg);border-radius:24px 24px 0 0;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.open .panel{transform:translateY(0);}
.panel-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.panel-title{font-size:1.1rem;font-weight:700;color:var(--wine);}
.panel-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--wine-light);cursor:pointer;font-size:1rem;color:var(--wine);display:flex;align-items:center;justify-content:center;}
.panel-body{overflow-y:auto;flex:1;padding:4px 20px 24px;}

/* ── Tabs ── */
.panel-tabs{display:flex;gap:4px;background:var(--wine-light);border-radius:10px;padding:4px;margin-bottom:18px;}
[data-theme="dark"] .panel-tabs{background:rgba(184,88,104,0.15);}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.tab-btn.active{background:white;color:var(--wine);box-shadow:0 2px 8px rgba(184,88,104,.12);}
[data-theme="dark"] .tab-btn.active{background:var(--surface);}

/* ── Forms ── */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.78rem;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Heebo',sans-serif;font-size:.92rem;color:var(--text);outline:none;transition:border .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--wine);}
.form-textarea{resize:vertical;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.submit-btn{width:100%;background:var(--wine);color:white;border:none;border-radius:12px;padding:14px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:6px;}
.submit-btn:hover{background:var(--wine-dark);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;}

/* ── List Items ── */
.list-wrap{display:flex;flex-direction:column;gap:8px;}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.list-item-icon{font-size:1.1rem;flex-shrink:0;}
.list-item-info{flex:1;min-width:0;}
.list-item-title{font-size:.88rem;font-weight:500;}
.list-item-sub{font-size:.72rem;color:var(--text-muted);margin-top:2px;}
.list-item-amount{font-size:.92rem;font-weight:600;color:var(--wine);}
.list-item-actions{display:flex;gap:6px;}
.item-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.item-btn.edit{background:var(--wine-light);color:var(--wine);}
.item-btn.del{background:#fee;color:var(--danger);}
.item-btn:hover{transform:scale(1.1);}

/* ── Reminder badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:500;}
.badge-active{background:var(--wine-light);color:var(--wine);}
.badge-done{background:#efe;color:var(--success);}
.badge-snoozed{background:#fff3cd;color:#856404;}

/* ── Settings ── */
.set-section{margin-bottom:20px;}
.set-title{font-size:.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.set-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.set-row-label{font-size:.85rem;font-weight:500;margin-bottom:6px;}
.notif-options{display:flex;gap:8px;margin-top:8px;}
.notif-opt{flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;transition:all .2s;font-size:.78rem;font-weight:500;color:var(--text-muted);}
.notif-opt.active{border-color:var(--wine);color:var(--wine);background:var(--wine-light);}
.url-row{display:flex;gap:8px;margin-top:8px;}
.url-row .form-input{flex:1;font-size:.78rem;direction:ltr;text-align:left;}
.url-save-btn{background:var(--wine);color:white;border:none;border-radius:8px;padding:0 14px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.test-res{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:.78rem;display:none;}
.test-res.ok{background:#efe;color:#060;}
.test-res.fail{background:#fee;color:#c00;}
.conn-status{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-muted);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#ccc;}
.conn-dot.connected{background:#2e7d52;}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:.82rem;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);}
.toast.success{background:var(--success);}

/* ── Sync indicator ── */
.sync-bar{height:2px;background:var(--wine);position:fixed;top:0;left:0;right:0;z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;border-radius:1px;}
.sync-bar.syncing{animation:syncAnim 1.2s ease infinite;}
@keyframes syncAnim{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty-text{font-size:.88rem;}

/* ── Days picker ── */
.days-picker{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;}
.days-picker.show{display:flex;}
.day-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:transparent;font-family:'Heebo',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s;color:var(--text-muted);}
.day-btn.sel{border-color:var(--wine);background:var(--wine);color:white;}

/* ── Inline category ── */
.cat-add-row{display:none;align-items:center;gap:6px;margin-top:6px;}
.cat-add-row.visible{display:flex;}
.cat-add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Heebo',sans-serif;font-size:.82rem;color:var(--text);outline:none;}
.cat-add-input:focus{border-color:var(--wine);}
.cat-add-btn{background:var(--wine);color:white;border:none;border-radius:8px;padding:7px 12px;font-family:'Heebo',sans-serif;font-size:.78rem;cursor:pointer;}

/* ── Edit modal ── */
.edit-overlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.edit-overlay.open{display:flex;}
.edit-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);}
.edit-card{position:relative;background:var(--bg);border-radius:var(--r-lg);padding:24px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.edit-title{font-size:1rem;font-weight:700;color:var(--wine);margin-bottom:16px;}

/* ── Monthly report ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.month-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.month-nav-btn:hover{background:var(--wine-light);color:var(--wine);}
.month-title{font-size:1rem;font-weight:600;}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.report-row:last-child{border-bottom:none;}
.report-label{font-size:.85rem;}
.report-val{font-size:.92rem;font-weight:600;}
.report-val.pos{color:var(--success);}
.report-val.neg{color:var(--danger);}

@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){--bg:#0f0509;--surface:rgba(30,10,15,0.85);--surface2:rgba(40,15,20,0.7);--text:#f5e8ec;--text-light:#d4a0b0;--text-muted:#8a6070;--border:rgba(184,88,104,0.2);}}
</style>
</head>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const K = {i:'mfp_income',e:'mfp_expenses',r:'mfp_reminders',s:'mfp_shopping',u:'mfp_url',n:'mfp_notif',t:'mfp_tg',em:'mfp_email'};
const lsr = k => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{return null;} };
const lsw = (k,v) => localStorage.setItem(k, JSON.stringify(v));

let iList = lsr(K.i)||[];
let eList = lsr(K.e)||[];
let rList = lsr(K.r)||[];
let sList = lsr(K.s)||[];
let SCRIPT_URL = localStorage.getItem(K.u)||'';
let NOTIF_TYPE = localStorage.getItem(K.n)||'telegram'; // telegram / email / both
let NOTIF_EMAIL = localStorage.getItem(K.em)||'';

let curPage = 'home';
let curEditId = null;
let reportMonth = new Date().getMonth();
let reportYear  = new Date().getFullYear();

// Categories
let incCats = lsr('mfp_inc_cats')||['פרויקט','ייעוץ','מכירה','שכר','אחר'];
let expCats = lsr('mfp_exp_cats')||['משרד','תחבורה','אוכל','תוכנות','שיווק','אחר'];
let selDays  = [];

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
let authMode = 'login';
function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('auth-submit').textContent = mode==='login'?'כניסה':'הרשמה';
  document.getElementById('auth-pass2-wrap').style.display = mode==='register'?'block':'none';
  hideAuthMsg();
}
function showAuthErr(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';document.getElementById('auth-success').style.display='none';}
function showAuthOk(msg){const el=document.getElementById('auth-success');el.textContent=msg;el.style.display='block';document.getElementById('auth-error').style.display='none';}
function hideAuthMsg(){document.getElementById('auth-error').style.display='none';document.getElementById('auth-success').style.display='none';}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const btn   = document.getElementById('auth-submit');
  if (!email||!pass){showAuthErr('נא למלא אימייל וסיסמא');return;}
  if (authMode==='register'&&pass!==document.getElementById('auth-pass2').value){showAuthErr('הסיסמאות אינן תואמות');return;}
  btn.disabled=true; btn.textContent='טוען...';
  try {
    const {_auth,_fbFns} = window;
    if (authMode==='login') await _fbFns.signInWithEmailAndPassword(_auth, email, pass);
    else await _fbFns.createUserWithEmailAndPassword(_auth, email, pass);
  } catch(e) {
    const msgs = {'auth/invalid-email':'כתובת אימייל לא תקינה','auth/user-not-found':'משתמש לא נמצא','auth/wrong-password':'סיסמא שגויה','auth/email-already-in-use':'האימייל כבר רשום','auth/weak-password':'הסיסמא קצרה מדי (לפחות 6 תווים)','auth/invalid-credential':'אימייל או סיסמא שגויים'};
    showAuthErr(msgs[e.code]||'שגיאה: '+e.message);
    btn.disabled=false; btn.textContent=authMode==='login'?'כניסה':'הרשמה';
  }
}

async function doForgot() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email){showAuthErr('נא להזין אימייל קודם');return;}
  try{ await window._fbFns.sendPasswordResetEmail(window._auth, email); showAuthOk('נשלח מייל לאיפוס סיסמא!'); }
  catch(e){showAuthErr('שגיאה: '+e.message);}
}

async function doSignOut() {
  if(!confirm('להתנתק?'))return;
  await window._fbFns.signOut(window._auth);
}

// Enter key on auth
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('auth-screen').style.display!=='none') doAuth();
});

// ══════════════════════════════════════════════
//  PAGES
// ══════════════════════════════════════════════
function showPage(page) {
  curPage = page;
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('bnav-'+page);
  if(btn) btn.classList.add('active');
  const mc = document.getElementById('main-content');
  if(page==='home')       mc.innerHTML = buildHome();
  else if(page==='income')    mc.innerHTML = buildIncomePage();
  else if(page==='expenses')  mc.innerHTML = buildExpensesPage();
  else if(page==='reminders') mc.innerHTML = buildRemindersPage();
  else if(page==='shopping')  mc.innerHTML = buildShoppingPage();
}

// ══════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════
function buildHome() {
  const now    = new Date();
  const month  = now.getMonth();
  const year   = now.getFullYear();
  const mnInc  = iList.filter(i=>{ const d=new Date(i.date); return d.getMonth()===month&&d.getFullYear()===year; });
  const mnExp  = eList.filter(e=>{ const d=new Date(e.date); return d.getMonth()===month&&d.getFullYear()===year; });
  const totalInc = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalExp = mnExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalTax = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0)*(parseFloat(i.tax)||0)/100,0);
  const balance  = totalInc - totalExp;
  const taxPct   = totalInc>0?(totalTax/totalInc*100).toFixed(1):0;
  const months   = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const todayRem = rList.filter(r=>r.status!=='בוצע').length;
  const shopCount= sList.length;

  // Recent transactions (last 3)
  const recent = [
    ...mnInc.slice(-2).map(i=>({...i,type:'income'})),
    ...mnExp.slice(-2).map(e=>({...e,type:'expense'}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);

  return `<div class="dashboard">
    <div class="dash-greeting">${greeting()}</div>
    <div class="dash-title">${months[month]} ${year}</div>

    <div class="summary-grid">
      <div class="summary-card accent">
        <div class="summary-label">יתרה חודשית</div>
        <div class="summary-value">₪${fmt(balance)}</div>
        <div class="summary-sub">${balance>=0?'✓ חיובי':'⚠ שלילי'}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">מס משוער</div>
        <div class="summary-value" style="color:var(--wine)">₪${fmt(totalTax)}</div>
        <div class="summary-sub">${taxPct}% מההכנסות</div>
        <div class="tax-bar-wrap">
          <div class="tax-bar"><div class="tax-bar-fill" style="width:${Math.min(taxPct,100)}%"></div></div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-label">הכנסות החודש</div>
        <div class="summary-value" style="color:var(--success)">₪${fmt(totalInc)}</div>
        <div class="summary-sub">${mnInc.length} רשומות</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">הוצאות החודש</div>
        <div class="summary-value" style="color:var(--danger)">₪${fmt(totalExp)}</div>
        <div class="summary-sub">${mnExp.length} רשומות</div>
      </div>
    </div>

    ${recent.length>0?`
    <div class="section-title">פעילות אחרונה</div>
    <div class="recent-list">
      ${recent.map(r=>`
        <div class="recent-item">
          <div class="recent-icon">${r.type==='income'?'💰':'💸'}</div>
          <div class="recent-info">
            <div class="recent-name">${r.type==='income'?(r.business||'הכנסה'):(r.category||'הוצאה')}</div>
            <div class="recent-date">${fmtDate(r.date)}</div>
          </div>
          <div class="recent-amount ${r.type}">${r.type==='income'?'+':'-'}₪${fmt(r.amount)}</div>

function openPanel(type) {
  const cfg = PANELS[type];
  if(!cfg) return;
  document.getElementById('panel-title').textContent = cfg.title;
  document.getElementById('panel-body').innerHTML = cfg.build();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  if(cfg.onOpen) cfg.onOpen();
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if(e.target===document.getElementById('overlay')||e.target.classList.contains('overlay-bg')) closePanel();
}

const v = id => document.getElementById(id)?.value?.trim()||'';

async function saveIncome(editId='') {
  const amount = parseFloat(v('f-amount'));
  if(!amount){showToast('נא להזין סכום','error');return;}
  const btn = document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='שומר...';
  const id = editId||uid();
  const e = {id, date:v('f-date'), receipt:v('f-receipt'), business:v('f-business'),
    category:v('f-cat-inc'), amount, tax:parseFloat(v('f-tax'))||0, description:v('f-desc')};
  if(editId) iList = iList.map(i=>i.id===editId?e:i);
  else iList.push(e);
  lsw(K.i,iList);
  try{ await post({action:'saveManualIncome',...e,edit:!!editId}); }catch(err){console.warn(err);}
  closePanel(); closeEdit();
  showPage(curPage); showToast('✓ נשמר!','success');
}

async function saveExpense(editId='') {
  const amount = parseFloat(v('f-amount'));
  if(!amount){showToast('נא להזין סכום','error');return;}
  const btn = document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='שומר...';
  const id = editId||uid();
  const e = {id, date:v('f-date'), invoice:v('f-invoice'), category:v('f-cat-exp'), amount};
  if(editId) eList = eList.map(i=>i.id===editId?e:i);
  else eList.push(e);
  lsw(K.e,eList);
  try{ await post({action:'saveExpense',...e,edit:!!editId}); }catch(err){console.warn(err);}
  closePanel(); closeEdit();
  showPage(curPage); showToast('✓ נשמר!','success');
}

async function saveReminder(editId='') {
  const task = v('f-task');
  if(!task){showToast('נא להזין משימה','error');return;}
  const btn = document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='שומר...';
  const id = editId||uid();
  const recur = v('f-recur');
  const e = {id, date:v('f-date'), time:v('f-time'), task, recurrence:recur,
    days:recur==='weekly'?selDays:[], status:'פעיל'};
  if(editId) rList = rList.map(i=>i.id===editId?e:i);
  else rList.push(e);
  lsw(K.r,rList);
  try{ await post({action:'saveReminder',...e,edit:!!editId}); }catch(err){console.warn(err);}
  closePanel(); closeEdit();
  showPage(curPage); showToast('✓ נשמר!','success');

async function addShopItem() {
  const name = v('f-item');
  if(!name){showToast('נא להזין שם מוצר','error');return;}
  const btn = document.getElementById('sbtn');
  btn.disabled=true; btn.textContent='שומר...';
  const e = {id:uid(), name, qty:v('f-qty')||'1', category:v('f-cat-shop')||'כללי'};
  sList.push(e); lsw(K.s,sList);
  try{ await post({action:'addShoppingItem',...e}); }catch(err){console.warn(err);}
  showToast('✓ נוסף!','success');
  btn.disabled=false; btn.textContent='✓ הוסף לרשימה';
  const fi=document.getElementById('f-item'); if(fi){fi.value='';fi.focus();}
  const fq=document.getElementById('f-qty'); if(fq)fq.value='1';
}

function showCatInput(type) {
  const el = document.getElementById('new-cat-'+type);
  if(el) el.classList.toggle('visible');

function addCat(type) {
  const val = document.getElementById('new-cat-'+type+'-val')?.value?.trim();
  if(!val)return;
  if(type==='inc'){incCats.push(val);lsw('mfp_inc_cats',incCats);document.getElementById('f-cat-inc').innerHTML=catOpts(incCats);}
  else if(type==='exp'){expCats.push(val);lsw('mfp_exp_cats',expCats);document.getElementById('f-cat-exp').innerHTML=catOpts(expCats);}
  else if(type==='shop'){const sc=lsr('mfp_shop_cats')||['מזון','ניקיון','בית','אחר'];sc.push(val);lsw('mfp_shop_cats',sc);document.getElementById('f-cat-shop').innerHTML=catOpts(sc);}
  document.getElementById('new-cat-'+type).classList.remove('visible');
  showToast('קטגוריה נוספה');
}

//  REPORT
// ══════════════════════════════════════════════
function buildReport() {
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `
    <div class="month-nav">
      <button class="month-nav-btn" onclick="changeReportMonth(-1)">›</button>
      <div class="month-title" id="report-month-title">${months[reportMonth]} ${reportYear}</div>
      <button class="month-nav-btn" onclick="changeReportMonth(1)">‹</button>
    </div>
    <div id="report-content">${buildReportContent()}</div>`;
}
function changeReportMonth(dir) {
  reportMonth += dir;
  if(reportMonth<0){reportMonth=11;reportYear--;}
  if(reportMonth>11){reportMonth=0;reportYear++;}
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const el = document.getElementById('report-month-title');
  if(el) el.textContent = months[reportMonth]+' '+reportYear;
  const rc = document.getElementById('report-content');
  if(rc) rc.innerHTML = buildReportContent();
}
function buildReportContent() {
  const mnInc = iList.filter(i=>{const d=new Date(i.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  const mnExp = eList.filter(e=>{const d=new Date(e.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  const totalInc = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalExp = mnExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalTax = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0)*(parseFloat(i.tax)||0)/100,0);
  const balance  = totalInc-totalExp;
  // Group expenses by category
  const expByCat = {};
  mnExp.forEach(e=>{expByCat[e.category||'אחר']=(expByCat[e.category||'אחר']||0)+(parseFloat(e.amount)||0);});
  return `
    <div class="report-row"><span class="report-label">סה"כ הכנסות</span><span class="report-val pos">₪${fmt(totalInc)}</span></div>
    <div class="report-row"><span class="report-label">סה"כ הוצאות</span><span class="report-val neg">₪${fmt(totalExp)}</span></div>
    <div class="report-row"><span class="report-label">יתרה</span><span class="report-val ${balance>=0?'pos':'neg'}">₪${fmt(balance)}</span></div>
    <div class="report-row"><span class="report-label">מס הכנסה משוער</span><span class="report-val neg">₪${fmt(totalTax)}</span></div>
    ${Object.entries(expByCat).map(([cat,sum])=>`<div class="report-row"><span class="report-label" style="color:var(--text-muted)">  ${cat}</span><span class="report-val" style="color:var(--text-muted)">₪${fmt(sum)}</span></div>`).join('')}
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;">
      <button class="submit-btn" onclick="exportCSV()">⬇️ ייצוא CSV לרו"ח</button>
      <button class="submit-btn" style="background:var(--surface);color:var(--wine);border:1px solid var(--wine);" onclick="sendReport()">📤 שלח דוח</button>
    </div>`;
}

function exportCSV() {
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const mnInc = iList.filter(i=>{const d=new Date(i.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  const mnExp = eList.filter(e=>{const d=new Date(e.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  let csv = '\uFEFF';
  csv += 'סוג,תאריך,קבלה/חשבונית,עסק/קטגוריה,סכום,מס%,תיאור\n';
  mnInc.forEach(i=>{ csv+=`הכנסה,${i.date},${i.receipt||''},${i.business||''},${i.amount},${i.tax||0},${i.description||''}\n`; });
  mnExp.forEach(e=>{ csv+=`הוצאה,${e.date},${e.invoice||''},${e.category||''},${e.amount},,\n`; });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `דוח_${months[reportMonth]}_${reportYear}.csv`;
  a.click();
  showToast('קובץ CSV הורד!','success');
}

async function sendReport() {
  if(!SCRIPT_URL){showToast('נא להגדיר Apps Script URL בהגדרות','error');return;}
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const mnInc = iList.filter(i=>{const d=new Date(i.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  const mnExp = eList.filter(e=>{const d=new Date(e.date);return d.getMonth()===reportMonth&&d.getFullYear()===reportYear;});
  const totalInc = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalExp = mnExp.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalTax = mnInc.reduce((s,i)=>s+(parseFloat(i.amount)||0)*(parseFloat(i.tax)||0)/100,0);
  try {
    await post({action:'sendMonthlyReport', month:months[reportMonth], year:reportYear,
      totalInc, totalExp, totalTax, balance:totalInc-totalExp,
      notifType:NOTIF_TYPE, email:NOTIF_EMAIL});
    showToast('הדוח נשלח!','success');
  } catch(e) { showToast('שגיאה בשליחה','error'); }
}

function loadSettingsData() {

function setNotif(type) {
  const opts = document.querySelectorAll('.notif-opt');
  if(NOTIF_TYPE===type) { // toggle both
    NOTIF_TYPE = NOTIF_TYPE==='both'?'telegram':NOTIF_TYPE==='telegram'&&type==='email'?'both':NOTIF_TYPE==='email'&&type==='telegram'?'both':type;
  } else if(NOTIF_TYPE!=='both'&&NOTIF_TYPE!==type) {
    NOTIF_TYPE='both';
  } else {
    NOTIF_TYPE=type;
  }
  localStorage.setItem(K.n,NOTIF_TYPE);
  opts[0].classList.toggle('active',NOTIF_TYPE==='telegram'||NOTIF_TYPE==='both');
  opts[1].classList.toggle('active',NOTIF_TYPE==='email'||NOTIF_TYPE==='both');
  document.getElementById('email-input-wrap').style.display=(NOTIF_TYPE==='email'||NOTIF_TYPE==='both')?'block':'none';

function saveNotifEmail() {
  NOTIF_EMAIL = document.getElementById('notif-email')?.value?.trim()||'';
  localStorage.setItem(K.em,NOTIF_EMAIL);
  showToast('אימייל נשמר','success');
}
function saveUrl() {
  SCRIPT_URL = document.getElementById('url-input')?.value?.trim()||'';
  localStorage.setItem(K.u,SCRIPT_URL);
  updateConnStatus();
  showToast(SCRIPT_URL?'URL נשמר':'חיבור נותק');
  if(SCRIPT_URL) syncSheets();
}
function updateConnStatus() {
  const dot  = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  if(!dot||!text)return;
  if(SCRIPT_URL){dot.classList.add('connected');text.textContent='מחובר';}
  else{dot.classList.remove('connected');text.textContent='לא מחובר';}
}
async function testConn() {
  const u = document.getElementById('url-input')?.value?.trim();
  const r = document.getElementById('test-res');
  if(r){r.style.display='block';r.className='test-res';r.textContent='בודק...';}
  if(!u){if(r){r.className='test-res fail';r.textContent='לא הוזנה כתובת';}return;}
  try{
    const res = await fetch(`${u}?action=ping`,{redirect:'follow'});
    const data = await res.json();
    if(r){r.className='test-res ok';r.textContent=data.status==='ok'?'✓ חיבור תקין!':'⚠ תגובה לא צפויה';}
  }catch{if(r){r.className='test-res fail';r.textContent='❌ לא ניתן להתחבר';}}
}

// ══════════════════════════════════════════════
//  SHEETS SYNC
// ══════════════════════════════════════════════
async function syncSheets() {
  if(!SCRIPT_URL)return;
  const bar = document.getElementById('sync-bar');
  if(bar)bar.classList.add('syncing');
  try{
    const r = await fetch(`${SCRIPT_URL}?action=getAll`,{redirect:'follow'});
    if(!r.ok)throw new Error('fetch failed');
    const d = await r.json();
    if(d.income   && d.income.length>0)  {iList=d.income;   lsw(K.i,iList);}
    if(d.expenses && d.expenses.length>0){eList=d.expenses;  lsw(K.e,eList);}
    if(d.reminders&& d.reminders.length>0){rList=d.reminders;lsw(K.r,rList);}
    if(d.shopping && d.shopping.length>0){sList=d.shopping;  lsw(K.s,sList);}
    showPage(curPage);
  }catch(e){console.warn('sync:',e);}
  finally{if(bar){bar.classList.remove('syncing');}}
}

async function post(payload) {
  if(!SCRIPT_URL){await new Promise(r=>setTimeout(r,300));return{success:true};}
  const params = new URLSearchParams({data:JSON.stringify(payload)});
  const r = await fetch(SCRIPT_URL,{method:'POST',body:params,redirect:'follow'});
  if(!r.ok)throw new Error('server error');
  return r.json();
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36); }
function fmt(n){ return (parseFloat(n)||0).toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d)return''; try{return new Date(d).toLocaleDateString('he-IL');}catch{return d;} }
function greeting(){ const h=new Date().getHours(); return h<12?'בוקר טוב ☀️':h<17?'צהריים טובים 🌤️':h<20?'אחר צהריים טוב 🌅':'ערב טוב 🌙'; }
function recurLabel(r){ const m={once:'חד פעמי',daily:'יומי',weekly:'שבועי',monthly:'חודשי',bimonthly:'דו-חודשי',yearly:'שנתי'}; return m[r]||r||''; }

function showToast(msg,type='') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  void t.offsetWidth; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function toggleTheme() {
  const d = document.documentElement;
  const dark = d.getAttribute('data-theme')==='dark';
  dark?d.removeAttribute('data-theme'):d.setAttribute('data-theme','dark');
  document.getElementById('moon-btn').textContent=dark?'🌙':'☀️';
}

// Load app on start
function loadFromSheets() {
  showPage('home');
  syncSheets();
}
